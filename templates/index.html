<!DOCTYPE html>
<html>
<head>
    <title>Tradutor de Voz Multilíngue</title>
    <meta charset="utf-8">
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        button { padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer; }
        #recordBtn { background-color: #e74c3c; color: white; border: none; border-radius: 5px; }
        #stopBtn { background-color: #95a5a6; color: white; border: none; border-radius: 5px; }
        .translations { margin-top: 30px; border-top: 1px solid #ccc; padding-top: 20px; }
        select, input[type="file"] { margin: 10px 0; padding: 5px; width: 200px; }
        #loading { color: blue; margin: 10px 0; }
        #original, #translated { background-color: #f9f9f9; padding: 10px; border-left: 5px solid #3498db; margin: 10px 0; }
        #translated { border-left-color: #2ecc71; }
        #error { color: red; margin: 10px 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>🎤 Tradutor de Voz Multilíngue</h1>
    <p>Grave sua voz ou envie um arquivo de áudio</p>
    
    <div>
        <button id="recordBtn">🎙️ Gravar</button>
        <button id="stopBtn" disabled>⏹️ Parar</button>
        <span id="timer">0:00</span>
        <p><small>A gravação será enviada automaticamente após a parada (mínimo 2 segundos).</small></p>
    </div>
    
    <div>
        <p>📁 Ou envie um arquivo de áudio (WAV, MP3, etc.)</p>
        <input type="file" id="audioFile" accept="audio/*">
    </div>
    
    <div>
        <label>🎤 Idioma de origem (fala):</label>
        <select id="srcLang">
            <option value="pt">Português</option>
            <option value="en">Inglês</option>
            <option value="es">Espanhol</option>
            <option value="fr">Francês</option>
            <option value="de">Alemão</option>
        </select>
    </div>
    
    <div>
        <label>🌐 Traduzir para:</label>
        <select id="tgtLang">
            <option value="en">Inglês (English)</option>
            <option value="pt">Português</option>
            <option value="es">Espanhol</option>
            <option value="fr">Francês</option>
            <option value="de">Alemão</option>
        </select>
    </div>
    
    <div>
        <button id="translateBtn">🚀 Traduzir Áudio</button>
    </div>
    
    <div id="loading" style="display:none;">Processando áudio... aguarde.</div>
    
    <div class="translations" id="resultArea">
        <h3>Tradução:</h3>
        <div id="original"></div>
        <div id="translated"></div>
        <div id="error"></div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let timerInterval;
        let seconds = 0;
        
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const timerSpan = document.getElementById('timer');
        const audioFileInput = document.getElementById('audioFile');
        const translateBtn = document.getElementById('translateBtn');
        
        recordBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // Tenta usar codec mais compatível
                const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
                mediaRecorder = new MediaRecorder(stream, { mimeType });
                audioChunks = [];
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = () => {
                    if (seconds < 2) {
                        document.getElementById('error').innerText = 'Áudio muito curto. Grave pelo menos 2 segundos.';
                        if (stream) stream.getTracks().forEach(track => track.stop());
                        return;
                    }
                    const audioBlob = new Blob(audioChunks, { type: mimeType });
                    sendAudio(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
                recordBtn.disabled = true;
                stopBtn.disabled = false;
                seconds = 0;
                updateTimer();
                timerInterval = setInterval(() => { seconds++; updateTimer(); }, 1000);
            } catch (err) {
                document.getElementById('error').innerText = 'Erro ao acessar microfone: ' + err.message;
            }
        };
        
        stopBtn.onclick = () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            recordBtn.disabled = false;
            stopBtn.disabled = true;
            clearInterval(timerInterval);
        };
        
        function updateTimer() {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timerSpan.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
        }
        
        translateBtn.onclick = () => {
            if (audioFileInput.files.length > 0) {
                sendAudio(audioFileInput.files[0]);
            } else {
                alert("Por favor, grave um áudio ou selecione um arquivo.");
            }
        };
        
        async function sendAudio(audioBlob) {
            const srcLang = document.getElementById('srcLang').value;
            const tgtLang = document.getElementById('tgtLang').value;
            const formData = new FormData();
            formData.append('audio', audioBlob, 'audio.webm');
            formData.append('src_lang', srcLang);
            formData.append('tgt_lang', tgtLang);
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').innerText = '';
            document.getElementById('original').innerHTML = '';
            document.getElementById('translated').innerHTML = '';
            
            try {
                const response = await fetch('/translate', { method: 'POST', body: formData });
                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    throw new Error(`Resposta inválida: ${text.substring(0, 200)}`);
                }
                if (response.ok) {
                    document.getElementById('original').innerHTML = `<strong>Original:</strong> ${data.original}`;
                    document.getElementById('translated').innerHTML = `<strong>Traduzido:</strong> ${data.translated}`;
                } else {
                    document.getElementById('error').innerText = `Erro: ${data.error || 'Erro desconhecido'}`;
                }
            } catch (err) {
                document.getElementById('error').innerText = `Erro de conexão: ${err.message}`;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
    </script>
</body>
</html>
